name: Daily autopublish

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "What should this manual run do?"
        required: true
        default: "autopublish"
        type: choice
        options:
          - autopublish
          - refresh-draft-screenshots
      refresh_limit:
        description: "Optional max number of draft screenshots to refresh"
        required: false
        default: ""
        type: string
      max_urls:
        description: "Optional candidate URL limit for manual autopublish runs"
        required: false
        default: ""
        type: string
      max_created:
        description: "Optional new item limit for manual autopublish runs"
        required: false
        default: ""
        type: string
  schedule:
    # Every day at 08:12 Europe/Istanbul.
    - cron: "12 5 * * *"

concurrency:
  group: dzinerhub-autopublisher
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  autopublish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'autopublish' }}
        run: npx playwright install --with-deps chromium

      - name: TypeScript check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Run autopublisher
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'autopublish' }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          FRAMER_API_KEY: ${{ secrets.FRAMER_API_KEY }}
          FRAMER_PROJECT_URL: ${{ secrets.FRAMER_PROJECT_URL }}
          SCREENSHOT_PROVIDER: ${{ vars.SCREENSHOT_PROVIDER || 'auto' }}
          SCREENSHOTAPI_API_KEY: ${{ secrets.SCREENSHOTAPI_API_KEY }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
          READ_FRAMER_IN_DRY_RUN: ${{ vars.READ_FRAMER_IN_DRY_RUN || 'true' }}
          PUBLISH: ${{ vars.PUBLISH || 'true' }}
          DRAFT_ITEMS: ${{ vars.DRAFT_ITEMS || 'false' }}
          MAX_URLS: ${{ inputs.max_urls || vars.MAX_URLS || '10' }}
          MAX_CREATED: ${{ inputs.max_created || '' }}
          MAX_DISCOVERY_PAGES: ${{ vars.MAX_DISCOVERY_PAGES || '32' }}
          MAX_DETAIL_PAGES_PER_SOURCE: ${{ vars.MAX_DETAIL_PAGES_PER_SOURCE || '16' }}
          MIN_QUALITY_SCORE: ${{ vars.MIN_QUALITY_SCORE || '0.68' }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL || 'https://dzinerhub.com' }}
          REPORT_FILE: autopublisher-report.json
          REF_PARAM: dzinerhub.com
        run: npm start

      - name: Run stories autopublisher
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'autopublish' }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          FRAMER_API_KEY: ${{ secrets.FRAMER_API_KEY }}
          FRAMER_PROJECT_URL: ${{ secrets.FRAMER_PROJECT_URL }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
          PUBLISH: ${{ vars.PUBLISH || 'true' }}
          DRAFT_ITEMS: ${{ vars.DRAFT_ITEMS || 'false' }}
          MAX_STORIES: ${{ vars.MAX_STORIES || '10' }}
          MAX_STORY_DISCOVERY_PAGES: ${{ vars.MAX_STORY_DISCOVERY_PAGES || '32' }}
          MIN_QUALITY_SCORE: ${{ vars.MIN_QUALITY_SCORE || '0.68' }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL || 'https://dzinerhub.com' }}
          STORY_SOURCE_FILE: data/story-sources.json
          STORY_REPORT_FILE: story-report.json
        run: npm run stories

      - name: Run inspiration autopublisher
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'autopublish' }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          FRAMER_API_KEY: ${{ secrets.FRAMER_API_KEY }}
          FRAMER_PROJECT_URL: ${{ secrets.FRAMER_PROJECT_URL }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
          PUBLISH: ${{ vars.PUBLISH || 'true' }}
          DRAFT_ITEMS: ${{ vars.DRAFT_ITEMS || 'false' }}
          MAX_INSPIRATION: ${{ vars.MAX_INSPIRATION || '5' }}
          MAX_INSPIRATION_DISCOVERY_PAGES: ${{ vars.MAX_INSPIRATION_DISCOVERY_PAGES || '32' }}
          MIN_INSPIRATION_QUALITY_SCORE: ${{ vars.MIN_INSPIRATION_QUALITY_SCORE || '0.82' }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL || 'https://dzinerhub.com' }}
          INSPIRATION_SOURCE_FILE: data/inspiration-sources.json
          INSPIRATION_REPORT_FILE: inspiration-report.json
        run: npm run inspiration

      - name: Refresh draft screenshots
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'refresh-draft-screenshots' }}
        env:
          FRAMER_API_KEY: ${{ secrets.FRAMER_API_KEY }}
          FRAMER_PROJECT_URL: ${{ secrets.FRAMER_PROJECT_URL }}
          SCREENSHOT_PROVIDER: screenshotapi
          SCREENSHOTAPI_API_KEY: ${{ secrets.SCREENSHOTAPI_API_KEY }}
          REFRESH_DRAFT_SCREENSHOT_LIMIT: ${{ inputs.refresh_limit }}
          REFRESH_SCREENSHOT_FIELDS: full-image
        run: npm run refresh:draft-screenshots

      - name: Publish site safety net
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.mode == 'autopublish') }}
        env:
          FRAMER_API_KEY: ${{ secrets.FRAMER_API_KEY }}
          FRAMER_PROJECT_URL: ${{ secrets.FRAMER_PROJECT_URL }}
          PUBLISH: "true"
        run: npm run publish

      - name: Create daily report issue
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.mode == 'autopublish') }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const path = "autopublisher-report.json";

            if (!fs.existsSync(path)) {
              core.warning("No autopublisher report file was found.");
              return;
            }

            const report = JSON.parse(fs.readFileSync(path, "utf8"));
            const storyReport = fs.existsSync("story-report.json")
              ? JSON.parse(fs.readFileSync("story-report.json", "utf8"))
              : null;
            const inspirationReport = fs.existsSync("inspiration-report.json")
              ? JSON.parse(fs.readFileSync("inspiration-report.json", "utf8"))
              : null;
            const summary = report.summary ?? {};
            const storySummary = storyReport?.summary ?? {};
            const inspirationSummary = inspirationReport?.summary ?? {};
            const created = report.created ?? [];
            const createdStories = storyReport?.created ?? [];
            const createdInspiration = inspirationReport?.created ?? [];
            const failed = report.failed ?? [];
            const storyFailed = storyReport?.failed ?? [];
            const inspirationFailed = inspirationReport?.failed ?? [];
            const addedCount = summary.created ?? created.length;
            const storyAddedCount = storySummary.created ?? createdStories.length;
            const inspirationAddedCount = inspirationSummary.created ?? createdInspiration.length;
            const failedCount =
              (summary.failed ?? failed.length) +
              (storySummary.failed ?? storyFailed.length) +
              (inspirationSummary.failed ?? inspirationFailed.length);
            const invalidCount = summary.skippedInvalid ?? 0;
            const storyInvalidCount = storySummary.skippedInvalid ?? 0;
            const inspirationInvalidCount = inspirationSummary.skippedInvalid ?? 0;
            const lowQualityCount =
              (summary.skippedLowQuality ?? 0) +
              (storySummary.skippedLowQuality ?? 0) +
              (inspirationSummary.skippedLowQuality ?? 0);
            const title = `DzinerHub Günlük Rapor - ${report.reportDate}`;

            const createdLines = created.length
              ? created.map((item, index) => `${index + 1}. [${item.title}](${item.dzinerHubLink})`).join("\n")
              : "Bugün yeni site eklenmedi.";
            const createdStoryLines = createdStories.length
              ? createdStories.map((item, index) => `${index + 1}. [${item.title}](${item.dzinerHubLink})`).join("\n")
              : "Bugün yeni link eklenmedi.";
            const createdInspirationLines = createdInspiration.length
              ? createdInspiration.map((item, index) => `${index + 1}. [${item.title}](${item.dzinerHubLink})`).join("\n")
              : "Bugün yeni inspiration eklenmedi.";
            const statusLine = failedCount > 0
              ? `${failedCount} adayda hata oluştu. Kontrol etmek iyi olur.`
              : "Sorun yok. Site publish edildi.";
            const skippedLine = invalidCount || storyInvalidCount || inspirationInvalidCount || lowQualityCount
              ? `Not: ${invalidCount + storyInvalidCount + inspirationInvalidCount} erişilemeyen/geçersiz aday, ${lowQualityCount} düşük kalite aday elendi.`
              : "";

            const body = [
              "@huseyinemanet",
              "",
              `Bugün ${addedCount} site, ${storyAddedCount} link ve ${inspirationAddedCount} inspiration eklendi.`,
              "",
              statusLine,
              skippedLine,
              "",
              "Eklenen siteler:",
              "",
              createdLines,
              "",
              "Eklenen linkler:",
              "",
              createdStoryLines,
              "",
              "Eklenen inspiration:",
              "",
              createdInspirationLines,
            ].filter(Boolean).join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["autopublisher-report"],
            });
