name: Daily autopublish

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "What should this manual run do?"
        required: true
        default: "autopublish"
        type: choice
        options:
          - autopublish
          - refresh-draft-screenshots
      refresh_limit:
        description: "Optional max number of draft screenshots to refresh"
        required: false
        default: ""
        type: string
      max_urls:
        description: "Optional candidate URL limit for manual autopublish runs"
        required: false
        default: ""
        type: string
      max_created:
        description: "Optional new item limit for manual autopublish runs"
        required: false
        default: ""
        type: string
  schedule:
    # Every day at 08:12 Europe/Istanbul.
    - cron: "12 5 * * *"

concurrency:
  group: dzinerhub-autopublisher
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  autopublish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'autopublish' }}
        run: npx playwright install --with-deps chromium

      - name: TypeScript check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Run autopublisher
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode == 'autopublish' }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          FRAMER_API_KEY: ${{ secrets.FRAMER_API_KEY }}
          FRAMER_PROJECT_URL: ${{ secrets.FRAMER_PROJECT_URL }}
          SCREENSHOT_PROVIDER: ${{ vars.SCREENSHOT_PROVIDER || 'auto' }}
          SCREENSHOTAPI_API_KEY: ${{ secrets.SCREENSHOTAPI_API_KEY }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
          READ_FRAMER_IN_DRY_RUN: ${{ vars.READ_FRAMER_IN_DRY_RUN || 'true' }}
          PUBLISH: ${{ vars.PUBLISH || 'true' }}
          DRAFT_ITEMS: ${{ vars.DRAFT_ITEMS || 'false' }}
          MAX_URLS: ${{ inputs.max_urls || vars.MAX_URLS || '10' }}
          MAX_CREATED: ${{ inputs.max_created || '' }}
          MAX_DISCOVERY_PAGES: ${{ vars.MAX_DISCOVERY_PAGES || '12' }}
          MAX_DETAIL_PAGES_PER_SOURCE: ${{ vars.MAX_DETAIL_PAGES_PER_SOURCE || '16' }}
          MIN_QUALITY_SCORE: ${{ vars.MIN_QUALITY_SCORE || '0.68' }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL || 'https://dzinerhub.framer.website' }}
          REPORT_FILE: autopublisher-report.json
          REF_PARAM: dzinerhub.com
        run: npm start

      - name: Refresh draft screenshots
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'refresh-draft-screenshots' }}
        env:
          FRAMER_API_KEY: ${{ secrets.FRAMER_API_KEY }}
          FRAMER_PROJECT_URL: ${{ secrets.FRAMER_PROJECT_URL }}
          SCREENSHOT_PROVIDER: screenshotapi
          SCREENSHOTAPI_API_KEY: ${{ secrets.SCREENSHOTAPI_API_KEY }}
          REFRESH_DRAFT_SCREENSHOT_LIMIT: ${{ inputs.refresh_limit }}
          REFRESH_SCREENSHOT_FIELDS: full-image
        run: npm run refresh:draft-screenshots

      - name: Create daily report issue
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.mode == 'autopublish') }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = "autopublisher-report.json";

            if (!fs.existsSync(path)) {
              core.warning("No autopublisher report file was found.");
              return;
            }

            const report = JSON.parse(fs.readFileSync(path, "utf8"));
            const summary = report.summary ?? {};
            const created = report.created ?? [];
            const skipped = report.skipped ?? [];
            const failed = report.failed ?? [];
            const title = `DzinerHub Daily Autopublish Report - ${report.reportDate}`;

            const createdLines = created.length
              ? created.map((item, index) => `${index + 1}. [${item.title}](${item.dzinerHubLink}) - [source](${item.externalLink})`).join("\n")
              : "No new websites were added today.";
            const skippedLines = skipped.slice(0, 20).map((item) => `- ${item.url} — ${item.reason}`).join("\n") || "No skipped items.";
            const failedLines = failed.map((item) => `- ${item.url} — ${item.error}`).join("\n") || "No failures.";

            const body = [
              "@huseyinemanet",
              "",
              `Daily DzinerHub autopublish finished at ${report.generatedAt}.`,
              "",
              "## Summary",
              "",
              `- Added: ${summary.created ?? 0}`,
              `- Published: ${report.published ? "yes" : "no"}`,
              `- Dry run: ${report.dryRun ? "yes" : "no"}`,
              `- Scanned: ${summary.scanned ?? 0}`,
              `- Discovered: ${summary.discovered ?? 0}`,
              `- Duplicates skipped: ${summary.skippedDuplicate ?? 0}`,
              `- Invalid skipped: ${summary.skippedInvalid ?? 0}`,
              `- Low-quality skipped: ${summary.skippedLowQuality ?? 0}`,
              `- Failed: ${summary.failed ?? 0}`,
              "",
              "## Added Websites",
              "",
              createdLines,
              "",
              "<details>",
              "<summary>Skipped candidates</summary>",
              "",
              skippedLines,
              "",
              "</details>",
              "",
              "<details>",
              "<summary>Failures</summary>",
              "",
              failedLines,
              "",
              "</details>",
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["autopublisher-report"],
            });
